[build]
  command = "npm run build"
  publish = "public"

[[headers]]
  for = "/agent/*"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/ai-agent.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/agent"
  to = "/agent/index.txt"
  status = 200

[[edge_functions]]
  function = "ua-redirect"
  path = "/"
